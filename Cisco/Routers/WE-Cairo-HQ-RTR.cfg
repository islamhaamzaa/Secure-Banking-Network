
!
version 15.7
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname WE-Cairo-HQ-RTR
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
!
!
!
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!


!
!
!
!
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 no shutdown
 ip address 10.10.30.130 255.255.255.255
!
interface Ethernet0/0
 no shutdown
 description TO-DMZ-FW
 ip address 10.10.10.10 255.255.255.252
 duplex auto
!
interface Ethernet0/1
 no shutdown
 description connect-WE-Cairo-PE
 ip address 10.10.30.1 255.255.255.252
 duplex auto
!
interface Ethernet0/2
 no shutdown
 no ip address
 shutdown
 duplex auto
!
interface Ethernet0/3
 no shutdown
 no ip address
 shutdown
 duplex auto
!
router ospf 1
 redistribute bgp 65100 subnets
 network 10.10.10.8 0.0.0.3 area 0
 network 10.10.30.130 0.0.0.0 area 0
 default-information originate
!
router bgp 65100
 bgp log-neighbor-changes
 network 10.10.10.8 mask 255.255.255.252
 network 10.10.30.130 mask 255.255.255.255
 neighbor 10.10.30.2 remote-as 65000
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
ipv6 ioam timestamp
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
