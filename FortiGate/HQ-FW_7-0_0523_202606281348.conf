        set ip 192.168.99.1 255.255.255.0
        set allowaccess ping https ssh
        set device-identification enable
        set role lan
        set snmp-index 14
        set auto-auth-extension-device enable
        set interface "port4"
        set vlanid 99
    next
    edit "TO-ASW-WE-VPN"
